# yaml-language-server: $schema=https://schema.blue-build.org/module-stage-list-v1.json
modules:
  - type: dnf
    install:
      packages:
        # - langpacks-en
        # - nss-tools
        - socat
        - gnome-shell-extension-system-monitor-applet
        - netcat
        # - fastfetch
        # - clinfo
        - hwinfo
        - gparted
        - mc
        - onedrive
        - gh
        - duc
        - nmap
        - age
        - gopass
        - opentofu
        - cloud-utils-cloud-localds
        - pipx
        - awscli2
        - chezmoi
        - zsh-autosuggestions
        - zsh-syntax-highlighting
        # Need Node.js for some tools like Claude Code
        - nodejs
        # ThinLinc client
        - https://www.cendio.com/downloads/clients/thinlinc-client-4.19.0-4005.x86_64.rpm
        - NetworkManager-l2tp
        - NetworkManager-l2tp-gnome
        - lsd
        - wireshark
        - strace
        - iperf3
        - fio
        - iftop
        - autofs
        - mosh
        - pinentry-tty
        - plocate
        # Required for pake builds
        - libsoup3-devel
        - cairo-devel
        - gtk3-devel
        - gdk-pixbuf2-devel
        - pango-devel
        - atk-devel
        - javascriptcoregtk4.1-devel
        - webkit2gtk4.1-devel
        - libayatana-appindicator-gtk3
        - libayatana-appindicator-gtk3-devel                                                                    
        - libappindicator-gtk3
        - libappindicator-gtk3-devel
        - gcc-c++
        - libxcrypt-compat.x86_64
        - google-cloud-cli
        # Firefox for brow.sh
        - firefox
        - firefox-langpacks
        # Terminal mouse support
        - gpm
        - gpm-devel
        
